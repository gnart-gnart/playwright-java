<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Quality Portal</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f6f9; }
        .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; }
        button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Dashboard Initialization</h1>
        <p id="status-text">Status: Offline</p>
        <button id="sync-btn" onclick="document.getElementById('status-text').innerText = 'Status: Ready'">Connect Services</button>
    </div>
</body>
</html>
